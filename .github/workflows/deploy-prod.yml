name: Deploy to Azure PROD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  AZURE_WEBAPP_NAME: quickformsph-webapp
  AZURE_RESOURCE_GROUP: quickformsph-rg

jobs:
  build-and-deploy:
    name: Build & Deploy to Azure App Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app (standalone)
        env:
          NODE_ENV: production
        run: npm run build

      - name: Assemble standalone deployment package
        run: |
          # Copy static assets into the standalone server directory
          cp -r .next/static .next/standalone/.next/static
          cp -r public/. .next/standalone/public/

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy standalone package to Azure Web App
        run: |
          cd .next/standalone
          zip -r /tmp/deploy.zip .

          az webapp deploy \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --src-path /tmp/deploy.zip \
            --type zip \
            --async true

      - name: Verify deployment URL
        run: |
          echo "Deployed → https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
